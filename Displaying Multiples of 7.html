<!DOCTYPE html>
<html>
<head>
    <title>Multiples of 7</title>
</head>
<body>

<h2>Multiples of 7 (1 to 100)</h2>

<p id="result"></p>

<script>
let output = "";

for (let i = 7; i <= 100; i += 7) {
    output += i + "<br>";
}

document.getElementById("result").innerHTML = output;
</script>

</body>
</html>
