<!DOCTYPE html>
<html>
<head>
    <title>Factorial</title>
</head>
<body>

<h2>Factorial of a Number</h2>

Enter Number:
<input type="number" id="num">
<button onclick="factorial()">Find</button>

<p id="result"></p>

<script>
function factorial() {
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact *= i;
    }

    document.getElementById("result").innerHTML =
        "Factorial = " + fact;
}
</script>

</body>
</html>
