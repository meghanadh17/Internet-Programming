<!DOCTYPE html>
<html>
<head>
    <title>Greater than 1000 and Divisible by 99</title>
</head>
<body>

<h2>Number Greater Than 1000 and Divisible by 99</h2>

<p id="result"></p>

<script>
let num = 1001;

while (true) {
    if (num % 99 === 0) {
        document.getElementById("result").innerHTML =
            "Number = " + num;
        break;
    }
    num++;
}
</script>

</body>
</html>
